namespace: Radius.Security
types:
  secrets:
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: object
          description: Portable secret bundle for generic key‑value pairs, TLS certs, basic‑auth, Docker config, etc.
          properties:
            environment:
              type: string
              description: The resource ID of the target environment.
            application:
              type: string
              description: The resource ID of the application owning the secret.
            kind:
              type: string
              enum: [generic, tls, basicAuth, awsIRSA, azureWorkloadIdentity, dockerConfig, sshKey, certificate]
              description: Logical type of secret payload.
            format:
              type: string
              enum: [kv, pem, pkcs12, json, binary]
              description: Content encoding for inline values (e.g., PEM, JSON).
            data:
              type: object
              description: Map of secret names to either literal values or external reference URIs.
              additionalProperties:
                type: string
                description: >
                  A literal secret value (for example, "my‑password") or an external
                  URI (for example, "akv://vault/secret?version=2025-01-01"). Recipes
                  decide how to handle each entry.
          required:
            - environment
            - application
            - kind
            - data
