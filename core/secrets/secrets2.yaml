namespace: Radius.Security
types:
  secrets:
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: object
          description: Secrets representation for generic key‑value pairs, TLS certs, basic‑auth, Docker config, etc.
          properties:
            environment:
              type: string
              description: The resource ID of the target environment.
            application:
              type: string
              description: The resource ID of the application owning the secret.
            kind:
              type: string
              enum: [generic, tls, basicAuth, awsIRSA, azureWorkloadIdentity, dockerConfig, sshKey, certificate]
              description: Logical type of secret payload.
            format:
              type: string
              enum: [kv, pem, pkcs12, json, binary]
              description: Content encoding for inline values (e.g., PEM, JSON).
            data:
              type: object
              description: Contains inline values and external references.
              properties:
                inline:
                  type: object
                  description: Secret values stored directly in the resource.
                  additionalProperties:
                    type: string
                external:
                  type: object
                  description: Secrets stored in an external provider.
                  additionalProperties:
                    type: object
                    properties:
                      uri:
                        type: string
                        description: Locator for the external secret (e.g., `akv://vault/secret?type=secret`).
                      version:
                        type: string
                        description: Optional version label/ID.
          required:
            - environment
            - application
            - kind
            - data
