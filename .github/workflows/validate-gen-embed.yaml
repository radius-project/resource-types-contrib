# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Validate Generated Embed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  validate-gen-embed:
    name: Validate manifests_gen.go is up to date
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Run go generate
        run: go generate ./...

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Working tree has uncommitted changes after 'go generate ./...'. Run 'go generate ./...' and commit the result."
            exit 1
          fi
          echo "Working tree is clean and up to date."
